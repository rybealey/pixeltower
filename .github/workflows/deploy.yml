name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild of all images'
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH + deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: FORCE_REBUILD
          script: |
            set -euo pipefail
            cd /opt/pixeltower
            git fetch --all --prune
            git reset --hard origin/main
            ENV_FILE=.env.production FORCE_REBUILD="${FORCE_REBUILD:-0}" ./scripts/deploy.sh
        env:
          FORCE_REBUILD: ${{ inputs.force_rebuild && '1' || '0' }}
